syntax = "proto3";

option java_package = "com.diProject.broker.generated";
option java_outer_classname = "StationMessageProto";
option java_multiple_files = true;

message WeatherStatus {
  int32 humidity = 1;
  int32 temperature = 2;
  int32 wind_speed = 3;
}

message StationMessage {
  int64 station_id = 1;
  int64 s_no = 2;
  string battery_status = 3;
  int64 timestamp = 4;
  WeatherStatus weather_status = 5;
}