apiVersion: v1
kind: ConfigMap
metadata:
  name: connector-json-config
data:
  connector-config.json: |
    {
      "name": "weather-s3-parquet-sink",
      "config": {
        "connector.class": "io.confluent.connect.s3.S3SinkConnector",
        "tasks.max": "3",
        "topics": "station-events",
        "s3.region": "us-east-1",
        "s3.bucket.name": "weather-bucket",
        "s3.part.size": "67108864",
        "storage.class": "io.confluent.connect.s3.storage.S3Storage",
        "format.class": "io.confluent.connect.s3.format.parquet.ParquetFormat",
        "parquet.codec": "snappy",
        "flush.size": "10000",
        "rotate.interval.ms": "600000",
        "rotate.schedule.interval.ms": "3600000",
        "partitioner.class": "io.confluent.connect.storage.partitioner.TimeBasedPartitioner",
        "timestamp.extractor": "RecordField",
        "timestamp.field": "timestamp",
        "path.format": "'year'=YYYY/'month'=MM/'day'=dd",
        "partition.duration.ms": "86400000",
        "locale": "en_US",
        "timezone": "UTC",
        "key.converter": "org.apache.kafka.connect.storage.StringConverter",
        "value.converter": "io.confluent.connect.protobuf.ProtobufConverter",
        "value.converter.schema.registry.url": "http://schema-registry:8081",
        "topics.dir": "parquet",
        "logs.dir": "logs",
        "s3.compression.type": "none",
        "s3.ssea.name": "",
        "store.url": "http://localstack:4566",
        "s3.path.style.access": "true"
      }
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-connector-setup
spec:
  template:
    spec:
      containers:
      - name: connector-creator
        image: curlimages/curl:latest
        command:
        - /bin/sh
        - -c
        - |
          # Wait for Connect API to be healthy
          while [ $(curl -s -o /dev/null -w "%{http_code}" http://kafka-connect:8083/connectors) -ne 200 ]; do
            echo "Waiting for Kafka Connect API..."
            sleep 5
          done
          # Submit the connector
          curl -X POST -H "Content-Type: application/json" \
            --data '@/config/connector-config.json' \
            http://kafka-connect:8083/connectors
        volumeMounts:
        - name: config-volume
          mountPath: /config
      volumes:
      - name: config-volume
        configMap:
          name: connector-json-config
      restartPolicy: OnFailure